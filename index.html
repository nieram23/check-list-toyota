<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Inspection KZJ90</title>
<style>
  :root {
    --ok:#1E7A1E;--ok-bg:#E8F5E9;--ok-b:#81C784;
    --ap:#9A7000;--ap-bg:#FFF8E1;--ap-b:#FFD54F;
    --ng:#CC5500;--ng-bg:#FFF0E6;--ng-b:#FFAB76;
    --rf:#B00000;--rf-bg:#FFEBEB;--rf-b:#EF9A9A;
    --blue:#1A3A5C;--blue-mid:#2E6DA4;--blue-light:#D6E4F0;
    --r:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:#EEF2F7;color:#1a1a1a;font-size:15px;}
  #app{max-width:600px;margin:0 auto;padding:0 0 90px;}

  header{background:var(--blue);color:white;padding:14px 14px 10px;position:sticky;top:0;z-index:100;}
  header h1{font-size:16px;font-weight:700;}
  header p{font-size:11px;opacity:0.7;margin-top:2px;}
  .prog-bar{height:4px;background:rgba(255,255,255,0.2);border-radius:2px;margin-top:8px;}
  .prog-fill{height:100%;background:#64B5F6;border-radius:2px;transition:width .3s;}

  .mode-toggle{display:flex;margin:10px 10px 0;gap:6px;}
  .mode-btn{flex:1;padding:9px 0;border:1.5px solid var(--blue-mid);border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;background:white;color:var(--blue);}
  .mode-btn.active{background:var(--blue);color:white;border-color:var(--blue);}

  .section{margin:10px 10px 0;}
  .sec-head{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--blue);color:white;border-radius:var(--r) var(--r) 0 0;cursor:pointer;user-select:none;}
  .sec-head.closed{border-radius:var(--r);margin-bottom:0;}
  .sec-title{font-size:13px;font-weight:700;flex:1;}
  .sec-badge{font-size:11px;background:rgba(255,255,255,0.2);padding:2px 7px;border-radius:10px;}
  .critiq-badge{font-size:10px;background:#E53935;padding:1px 6px;border-radius:6px;font-weight:700;}
  .chev{font-size:11px;transition:transform .2s;}
  .chev.o{transform:rotate(180deg);}

  .sec-body{background:white;border:1px solid #D0D9E6;border-top:none;border-radius:0 0 var(--r) var(--r);}

  .item{border-bottom:1px solid #F0F4F8;}
  .item:last-child{border-bottom:none;}
  .item-head{display:flex;align-items:flex-start;gap:10px;padding:11px 12px 9px;cursor:pointer;}
  .item-title{font-size:14px;font-weight:600;color:#1A3A5C;flex:1;line-height:1.3;}
  .item-action{font-size:12px;color:#666;margin-top:3px;line-height:1.4;}
  .item-weight{font-size:10px;padding:1px 6px;border-radius:5px;flex-shrink:0;margin-top:2px;font-weight:700;}
  .w-crit{background:#FFE5E5;color:#B00000;}
  .w-cost{background:#FFF0E6;color:#CC5500;}
  .w-fin{background:#F0F4F8;color:#556;}

  .icon{width:22px;height:22px;border-radius:50%;border:2px solid #CBD5E1;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;font-size:11px;transition:all .15s;}
  .icon.ok{background:var(--ok);border-color:var(--ok);color:white;}
  .icon.aprevoir{background:var(--ap);border-color:var(--ap);color:white;}
  .icon.negociation{background:var(--ng);border-color:var(--ng);color:white;}
  .icon.refus{background:var(--rf);border-color:var(--rf);color:white;}

  .opts{padding:0 12px 10px;}
  .opt{display:flex;align-items:flex-start;gap:9px;padding:8px 9px;margin:3px 0;border-radius:8px;border:1.5px solid #E8EDF2;cursor:pointer;transition:all .15s;}
  .opt:active{transform:scale(0.98);}
  .opt-dot{width:17px;height:17px;border-radius:50%;border:2px solid #CBD5E1;flex-shrink:0;margin-top:2px;}
  .opt-text{font-size:13px;line-height:1.4;color:#333;flex:1;}
  .opt-imp{font-size:10px;font-weight:700;padding:2px 6px;border-radius:5px;flex-shrink:0;margin-top:2px;}
  .opt.s-ok{background:var(--ok-bg);border-color:var(--ok-b);}
  .opt.s-ok .opt-dot{background:var(--ok);border-color:var(--ok);}
  .opt.s-aprevoir{background:var(--ap-bg);border-color:var(--ap-b);}
  .opt.s-aprevoir .opt-dot{background:var(--ap);border-color:var(--ap);}
  .opt.s-negociation{background:var(--ng-bg);border-color:var(--ng-b);}
  .opt.s-negociation .opt-dot{background:var(--ng);border-color:var(--ng);}
  .opt.s-refus{background:var(--rf-bg);border-color:var(--rf-b);}
  .opt.s-refus .opt-dot{background:var(--rf);border-color:var(--rf);}
  .imp-ok{background:var(--ok-bg);color:var(--ok);}
  .imp-aprevoir{background:var(--ap-bg);color:var(--ap);}
  .imp-negociation{background:var(--ng-bg);color:var(--ng);}
  .imp-refus{background:var(--rf-bg);color:var(--rf);}

  .interp{font-size:11px;color:#777;font-style:italic;margin-top:7px;padding:5px 8px;background:#F8FAFC;border-radius:6px;border-left:3px solid #CBD5E1;line-height:1.5;}

  .tip-box{background:#EEF6FF;border:1px solid #B3D4F5;border-radius:8px;padding:9px 11px;margin:8px 10px 0;font-size:12px;color:#1A3A5C;line-height:1.5;}

  .bottom{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #DCE4EE;padding:10px 14px;display:flex;gap:8px;}
  .btn-sum{flex:1;background:var(--blue);color:white;border:none;border-radius:var(--r);padding:13px;font-size:15px;font-weight:700;cursor:pointer;}
  .btn-sum:active{opacity:.85;}
  .btn-reset{background:#F0F4F8;color:#666;border:none;border-radius:var(--r);padding:13px 14px;font-size:13px;font-weight:600;cursor:pointer;}

  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:none;align-items:flex-end;}
  .overlay.v{display:flex;}
  .modal{background:white;border-radius:18px 18px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:18px 14px 40px;}
  .mhandle{width:36px;height:4px;background:#CBD5E1;border-radius:2px;margin:0 auto 14px;}
  .modal h2{font-size:17px;font-weight:700;color:var(--blue);margin-bottom:14px;}

  .verdict{border-radius:var(--r);padding:14px;margin-bottom:14px;text-align:center;}
  .verd-lbl{font-size:12px;font-weight:600;opacity:.8;}
  .verd-main{font-size:26px;font-weight:800;margin-top:3px;}
  .verd-sub{font-size:13px;margin-top:4px;opacity:.85;}
  .v-ok{background:var(--ok-bg);color:var(--ok);}
  .v-warn{background:var(--ap-bg);color:var(--ap);}
  .v-nego{background:var(--ng-bg);color:var(--ng);}
  .v-refus{background:var(--rf-bg);color:var(--rf);}

  .stats{display:flex;gap:6px;margin-bottom:14px;}
  .stat{flex:1;border-radius:8px;padding:9px 6px;text-align:center;}
  .stat-n{font-size:20px;font-weight:700;}
  .stat-l{font-size:10px;margin-top:1px;}

  .sum-sec{margin-bottom:12px;}
  .sum-sec h3{font-size:11px;font-weight:700;color:var(--blue);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
  .sum-item{display:flex;align-items:flex-start;gap:8px;padding:7px 9px;border-radius:8px;margin-bottom:3px;}
  .sum-name{font-size:13px;font-weight:600;flex:1;}
  .sum-obs{font-size:11px;color:#666;margin-top:2px;}
  .sum-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;flex-shrink:0;white-space:nowrap;}
  .unc{background:#F8FAFC;}

  .alert-crit{background:#FFF3CD;border:1px solid #FFD54F;border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:13px;color:#7A5900;display:flex;gap:8px;align-items:flex-start;line-height:1.5;}
  .alert-refus{background:var(--rf-bg);border:1px solid var(--rf-b);border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:13px;color:var(--rf);display:flex;gap:8px;align-items:flex-start;line-height:1.5;}

  .close-m{width:100%;margin-top:14px;background:#F0F4F8;border:none;border-radius:var(--r);padding:13px;font-size:15px;font-weight:600;cursor:pointer;color:#444;}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Checklist KZJ90 — Inspection terrain</h1>
    <p id="prog-txt">0 / 0 points vérifiés</p>
    <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  </header>

  <div class="mode-toggle">
    <button class="mode-btn active" id="btn-quick" onclick="setMode('quick')">Filtre rapide (8 pts)</button>
    <button class="mode-btn" id="btn-full" onclick="setMode('full')">Inspection complète</button>
  </div>

  <div class="tip-box" id="tip-quick">Commence par ces 8 points. Un seul rouge = inutile d'aller plus loin.</div>
  <div class="tip-box" style="display:none" id="tip-full">Inspection complète — 19 points organisés par gravité métier.</div>

  <div id="sc"></div>
</div>

<div class="bottom">
  <button class="btn-reset" onclick="resetAll()">↺</button>
  <button class="btn-sum" onclick="openSummary()">Voir l'avis global</button>
</div>

<div class="overlay" id="modal" onclick="bgClose(event)">
  <div class="modal">
    <div class="mhandle"></div>
    <div id="modal-body"></div>
    <button class="close-m" onclick="closeM()">Fermer</button>
  </div>
</div>

<script>
const IL={ok:"OK",aprevoir:"À prévoir",negociation:"Négociation",refus:"REFUS"};
const WL={crit:"CRITIQUE",cost:"COÛTEUX",fin:"MINEUR"};
const CLRS={ok:'#1E7A1E',aprevoir:'#9A7000',negociation:'#CC5500',refus:'#B00000'};

const DATA=[
  {id:"chassis",title:"Châssis & Structure",critical:true,items:[
    {id:"long_av",quick:true,weight:"crit",title:"Longerons avant",
     action:"Tournevis planté fort sur toute la longueur du longeron avant, sous le moteur",
     options:[
       {t:"Peinture intacte, métal sain — lame rebondit",impact:"ok"},
       {t:"Rouille de surface, métal résiste sous grattage",impact:"aprevoir"},
       {t:"Lame s'enfonce partiellement, métal friable sur une zone",impact:"negociation"},
       {t:"Lame traverse, trou ou métal qui cède sous pression",impact:"refus"}],
     interp:"Sur KZJ90 la corrosion attaque d'abord les flancs bas du longeron. Si la lame entre dans le métal : châssis compromis."},
    {id:"long_ar",quick:true,weight:"crit",title:"Longerons arrière",
     action:"Gratter au tournevis près des fixations de ressorts et de la traverse de remorquage",
     options:[
       {t:"Surface homogène, métal sain, pas de soudure visible",impact:"ok"},
       {t:"Rouille de surface, métal résiste, pas de déformation",impact:"aprevoir"},
       {t:"Soudures de réparation visibles — qualité et étendue à évaluer",impact:"negociation"},
       {t:"Métal cède au grattage, déformation ou boursouflure perceptible",impact:"refus"}],
     interp:"Une soudure de réparation n'est pas automatiquement rédhibitoire — c'est son étendue, sa qualité et le traitement anti-corrosion appliqué qui comptent."},
    {id:"traverse",quick:true,weight:"crit",title:"Traverse arrière",
     action:"Frapper la traverse de remorquage au marteau sur ses deux faces et ses angles",
     options:[
       {t:"Son clair et plein sur toute la traverse",impact:"ok"},
       {t:"Son légèrement mat, rouille de surface sans impact sur la rigidité",impact:"aprevoir"},
       {t:"Son creux sur une zone localisée — rouille interne probable",impact:"negociation"},
       {t:"Son creux sur la majorité de la traverse ou déformation visible",impact:"refus"}],
     interp:"Son creux = métal rongé de l'intérieur. Irréparable sans remplacement complet."},
    {id:"soub",quick:false,weight:"crit",title:"Soubassement & seuils",
     action:"Lampe torche sous le véhicule et dans chaque passage de roue. Gratter les seuils de portes par le bas au tournevis",
     options:[
       {t:"Protection homogène, seuils solides, aucune perforation",impact:"ok"},
       {t:"Rouille de surface sur zones non structurelles, métal sain dessous",impact:"aprevoir"},
       {t:"Métal exposé avec rouille pénétrante sur zone visible",impact:"negociation"},
       {t:"Perforation visible en soubassement ou seuil traversé par la rouille",impact:"refus"}],
     interp:"Les seuils de portes participent à la rigidité de caisse sur KZJ90. Une perforation est un problème structurel."}
  ]},
  {id:"moteur",title:"Moteur 1KZ-TE — Points critiques",critical:true,items:[
    {id:"demarr",quick:true,weight:"crit",title:"Démarrage à froid",
     action:"Arriver avant le vendeur. Poser la paume sur le capot — doit être froid. Démarrer sans aide extérieure",
     options:[
       {t:"Démarrage immédiat, régime stable en moins de 15 secondes",impact:"ok"},
       {t:"Démarrage en 3-5 secondes, régime instable puis se stabilise",impact:"aprevoir"},
       {t:"Démarrage long, fumée blanche épaisse persistant plus d'une minute",impact:"negociation"},
       {t:"Non-démarrage, ou fumée blanche qui persiste après 3 minutes de chauffe",impact:"refus"}],
     interp:"Fumée blanche persistante au-delà de 3 min = eau dans la chambre de combustion = joint de culasse."},
    {id:"huile",quick:true,weight:"crit",title:"État de l'huile moteur",
     action:"Sortir la jauge, essuyer sur papier blanc, remettre, ressortir. Observer couleur et présence de mousse",
     options:[
       {t:"Huile ambrée ou noire fluide, niveau correct, aucune mousse",impact:"ok"},
       {t:"Huile noire épaisse ou niveau légèrement bas — entretien à rattraper",impact:"aprevoir"},
       {t:"Niveau sous le MIN visible sur la jauge",impact:"negociation"},
       {t:"Mousse marron chocolat sur la jauge ou dans le goulot de remplissage",impact:"refus"}],
     interp:"Mousse = mélange huile/eau = joint de culasse percé. Signe le plus fiable sur le 1KZ-TE. Refus sans condition."},
    {id:"refroid",quick:true,weight:"crit",title:"Circuit de refroidissement",
     action:"Moteur FROID : ouvrir le vase d'expansion, observer niveau et couleur. Moteur chaud (80°C) : approcher le nez du goulot ouvert",
     options:[
       {t:"Niveau correct, liquide rose ou vert clair, aucune odeur de gaz",impact:"ok"},
       {t:"Liquide marron ou trouble, niveau correct, pas d'odeur particulière",impact:"aprevoir"},
       {t:"Niveau bas ou film huileux visible à la surface du liquide",impact:"negociation"},
       {t:"Odeur d'échappement au goulot, ou bulles visibles dans le vase à chaud",impact:"refus"}],
     interp:"Odeur de gaz ou bulles = gaz de combustion dans le circuit = joint de culasse. Point critique absolu sur le 1KZ-TE."},
    {id:"fumees",quick:false,weight:"crit",title:"Fumées à l'accélération",
     action:"Monter à 2500 tr/min, maintenir 5 secondes, relâcher brutalement. Observer l'échappement depuis l'arrière",
     options:[
       {t:"Aucune fumée visible",impact:"ok"},
       {t:"Légère fumée grise disparaissant en 2 secondes",impact:"aprevoir"},
       {t:"Fumée noire persistante plus de 5 secondes",impact:"negociation"},
       {t:"Fumée bleue persistante quelle que soit la durée",impact:"refus"}],
     interp:"Fumée bleue = huile brûlée dans la combustion. Segmentation ou guides soupapes. Révision moteur inévitable."}
  ]},
  {id:"train",title:"Train roulant & Freinage",critical:false,items:[
    {id:"amort",quick:false,weight:"cost",title:"Amortisseurs",
     action:"Appuyer fort sur chaque aile d'angle de tout son poids, relâcher d'un coup. Compter les oscillations",
     options:[
       {t:"Revient en position et s'immobilise en 1 oscillation maximum",impact:"ok"},
       {t:"Oscille 2 fois avant de s'immobiliser",impact:"aprevoir"},
       {t:"Oscille 3 fois ou plus avant de s'immobiliser",impact:"negociation"},
       {t:"Fuite d'huile visible sur le corps de l'amortisseur",impact:"negociation"}],
     interp:"Plus de 2 oscillations = amortisseur fatigué. Se changent par paires. Coût accessible, à chiffrer."},
    {id:"direction",quick:false,weight:"cost",title:"Jeu de direction",
     action:"Moteur allumé, au pas. Faire des petits mouvements gauche/droite sur le volant sans braquer vraiment — observer le délai avant que les roues réagissent",
     options:[
       {t:"Réponse immédiate, aucun jeu perceptible",impact:"ok"},
       {t:"Très léger temps mort, roues suivent rapidement",impact:"aprevoir"},
       {t:"Jeu notable avant que les roues bougent — plusieurs centimètres de rotation libre",impact:"negociation"},
       {t:"Jeu important, volant flou dans une direction ou direction molle",impact:"refus"}],
     interp:"Jeu au volant sans lever de roue = test terrain fiable pour détecter biellettes ou rotules usées."},
    {id:"cardans",quick:false,weight:"cost",title:"Cardans avant",
     action:"Braquage à fond en marche lente dans les deux sens (parking, fenêtre ouverte). Écouter chaque côté",
     options:[
       {t:"Aucun bruit en braquage à fond des deux côtés",impact:"ok"},
       {t:"Léger craquement non reproductible, disparaît",impact:"aprevoir"},
       {t:"Claquement clair et reproductible d'un côté à chaque rotation de roue",impact:"negociation"},
       {t:"Claquement violent ou vibration perceptible au volant en braquage",impact:"negociation"}],
     interp:"Claquement en braquage à fond = cardan en fin de vie. Pièce disponible et remplacement accessible. À chiffrer avant de négocier."},
    {id:"freinage",quick:true,weight:"crit",title:"Freinage",
     action:"À 50 km/h sur route sèche et droite : freiner fort jusqu'à l'arrêt complet. Observer la trajectoire et ressentir la pédale",
     options:[
       {t:"Arrêt en ligne droite, pédale ferme avec résistance progressive",impact:"ok"},
       {t:"Légère dérive, pédale ferme — déséquilibre léger",impact:"aprevoir"},
       {t:"Dérive marquée ou pédale qui s'enfonce en fin de course",impact:"negociation"},
       {t:"Pédale molle ou au plancher, ou dérive incontrôlable",impact:"refus"}],
     interp:"Pédale molle = air dans le circuit ou maître-cylindre. Dérive = freinage déséquilibré. Ne pas rouler dans les deux cas."}
  ]},
  {id:"carross",title:"Carrosserie",critical:false,items:[
    {id:"panneaux",quick:false,weight:"cost",title:"Alignement des panneaux",
     action:"Se placer à 3-4 mètres face à chaque côté, regard rasant. Observer si les panneaux s'alignent visuellement",
     options:[
       {t:"Tous les panneaux dans le même plan, jours réguliers partout",impact:"ok"},
       {t:"Un panneau légèrement en retrait ou en saillie, non flagrant",impact:"aprevoir"},
       {t:"Une aile, une porte ou un capot visiblement décalé par rapport au panneau voisin",impact:"negociation"},
       {t:"Plusieurs panneaux désalignés ou un panneau clairement enfoncé ou sorti",impact:"refus"}],
     interp:"Mots-clés terrain : 'aile qui ressort', 'porte qui affleure mal', 'capot plus haut d'un côté'. Pas besoin de mesurer."},
    {id:"aimant",quick:false,weight:"fin",title:"Détection mastic (aimant)",
     action:"Si tu as un aimant : le faire glisser sur ailes, portes et capot. Une zone où il adhère moins = mastic sous peinture",
     options:[
       {t:"Adhérence homogène sur tous les panneaux",impact:"ok"},
       {t:"Légère variation sur doublure ou protection plastique — faux positif normal",impact:"aprevoir"},
       {t:"Zone sans adhérence sur un seul panneau, localisée",impact:"negociation"},
       {t:"Plusieurs zones ou zone étendue sans adhérence",impact:"negociation"}],
     interp:"Test indicatif — faux positifs possibles sur parois doubles ou plastiques. Toujours croiser avec l'alignement des panneaux."},
    {id:"vitrages",quick:false,weight:"cost",title:"Vitrages",
     action:"Chaque vitre à contre-jour : impacts, fissures, état du pare-brise face à toi",
     options:[
       {t:"Aucun impact, aucune fissure, pas de sablage visible",impact:"ok"},
       {t:"Micro-impact hors du champ de conduite, pas d'amorce de fissure",impact:"aprevoir"},
       {t:"Impact dans le champ de conduite ou début de fissure visible",impact:"negociation"},
       {t:"Fissure propagée ou pare-brise sablé — visibilité insuffisante",impact:"refus"}],
     interp:"Fissure propagée = pare-brise à remplacer. Sablage = contre-visite probable au prochain CT."}
  ]},
  {id:"admin",title:"Administratif",critical:true,items:[
    {id:"vin",quick:true,weight:"crit",title:"VIN — Triple vérification",
     action:"Comparer le VIN de la carte grise / plaque tableau de bord / gravure sur longeron avant gauche — caractère par caractère",
     options:[
       {t:"Les 3 sources sont identiques, gravure châssis non retouchée",impact:"ok"},
       {t:"2 sources identiques, plaque tableau de bord légèrement décollée mais lisible",impact:"aprevoir"},
       {t:"Une lettre ou un chiffre diffère entre deux sources",impact:"refus"},
       {t:"Gravure châssis absente, surchargée, ou illisible",impact:"refus"}],
     interp:"Toute incohérence de VIN = véhicule potentiellement volé ou reconstitué. Stopper la visite immédiatement."},
    {id:"ct",quick:false,weight:"crit",title:"Contrôle technique",
     action:"Lire le rapport complet — pas uniquement la vignette. Identifier les défauts majeurs et les éventuelles contre-visites",
     options:[
       {t:"CT de moins de 6 mois, aucun défaut majeur noté",impact:"ok"},
       {t:"CT de 6 à 18 mois, défauts mineurs uniquement",impact:"aprevoir"},
       {t:"CT de plus de 18 mois ou contre-visite passée récemment",impact:"negociation"},
       {t:"Pas de CT présenté, ou défaut majeur châssis/freinage/direction non résolu",impact:"refus"}],
     interp:"Contre-visite récente = problème identifié et corrigé en urgence. Vérifier la cohérence avec ce que tu constates sur place."},
    {id:"km",quick:false,weight:"cost",title:"Cohérence kilométrique",
     action:"Demander les factures d'entretien. Comparer les km notés dessus avec le compteur actuel",
     options:[
       {t:"Factures présentes, kilométrages croissants et cohérents avec le compteur",impact:"ok"},
       {t:"Lacunes dans les factures, mais celles présentes sont cohérentes",impact:"aprevoir"},
       {t:"Peu ou pas de factures sur véhicule à kilométrage élevé — risque à intégrer dans la décote",impact:"negociation"},
       {t:"Un km de facture supérieur au compteur actuel — compteur trafiqué",impact:"refus"}],
     interp:"Absence de factures n'est pas un refus automatique — c'est un risque à transformer en argument de décote."}
  ]}
];

let mode="quick";
const state={};
const selOpt={};
DATA.forEach(s=>s.items.forEach(i=>{state[i.id]=null;}));

function setMode(m){
  mode=m;
  document.getElementById('btn-quick').className='mode-btn'+(m==='quick'?' active':'');
  document.getElementById('btn-full').className='mode-btn'+(m==='full'?' active':'');
  document.getElementById('tip-quick').style.display=m==='quick'?'block':'none';
  document.getElementById('tip-full').style.display=m==='full'?'block':'none';
  renderAll();
}

function visItems(sec){return mode==='quick'?sec.items.filter(i=>i.quick):sec.items;}

function renderAll(){
  const c=document.getElementById('sc');
  c.innerHTML='';
  DATA.forEach((sec,si)=>{
    const items=visItems(sec);
    if(!items.length)return;
    const done=items.filter(i=>state[i.id]!==null).length;
    const open=items.some(i=>state[i.id]===null);
    const d=document.createElement('div');
    d.className='section';
    d.innerHTML=`
      <div class="sec-head ${open?'':'closed'}" onclick="toggleSec('sb${si}',this)">
        <span class="sec-title">${sec.title}</span>
        ${sec.critical?'<span class="critiq-badge">CRITIQUE</span>':''}
        <span class="sec-badge">${done}/${items.length}</span>
        <span class="chev ${open?'o':''}">▼</span>
      </div>
      <div class="sec-body" id="sb${si}" style="display:${open?'block':'none'}">
        ${items.map(it=>rItem(it)).join('')}
      </div>`;
    c.appendChild(d);
  });
  updProg();
}

function rItem(it){
  const sel=state[it.id],idx=selOpt[it.id];
  const wc={crit:'w-crit',cost:'w-cost',fin:'w-fin'}[it.weight];
  return `<div class="item" id="itm${it.id}">
    <div class="item-head" onclick="toggleOpts('o${it.id}')">
      <div class="icon ${sel||''}" id="ic${it.id}">${sel?'✓':''}</div>
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <span class="item-title">${it.title}</span>
          <span class="item-weight ${wc}">${WL[it.weight]}</span>
        </div>
        <div class="item-action">${it.action}</div>
      </div>
    </div>
    <div class="opts" id="o${it.id}" style="display:none">
      ${it.options.map((opt,i)=>{
        const isSel=sel!==null&&idx===i;
        return `<div class="opt ${isSel?'s-'+sel:''}" id="oo${it.id}${i}" onclick="pick('${it.id}',${i},'${opt.impact}')">
          <div class="opt-dot" ${isSel?`style="background:${CLRS[sel]};border-color:${CLRS[sel]}"`:''}></div>
          <div class="opt-text">${opt.t}</div>
          <div class="opt-imp imp-${opt.impact}">${IL[opt.impact]}</div>
        </div>`;
      }).join('')}
      <div class="interp">${it.interp}</div>
    </div>
  </div>`;
}

function pick(id,idx,impact){
  state[id]=impact; selOpt[id]=idx;
  const it=DATA.flatMap(s=>s.items).find(i=>i.id===id);
  const ic=document.getElementById('ic'+id);
  ic.className='icon '+impact; ic.textContent='✓';
  it.options.forEach((_,i)=>{
    const el=document.getElementById('oo'+id+i);
    if(!el)return;
    el.className='opt'+(i===idx?' s-'+impact:'');
    const dot=el.querySelector('.opt-dot');
    dot.style.background=i===idx?CLRS[impact]:'';
    dot.style.borderColor=i===idx?CLRS[impact]:'';
  });
  setTimeout(()=>{document.getElementById('o'+id).style.display='none';},280);
  updProg();
}

function toggleOpts(id){const e=document.getElementById(id);e.style.display=e.style.display==='none'?'block':'none';}
function toggleSec(bodyId,head){
  const b=document.getElementById(bodyId),vis=b.style.display!=='none';
  b.style.display=vis?'none':'block';
  head.querySelector('.chev').className='chev'+(vis?'':' o');
  head.className='sec-head'+(vis?' closed':'');
}

function updProg(){
  const vis=DATA.flatMap(s=>visItems(s));
  const tot=vis.length,done=vis.filter(i=>state[i.id]!==null).length;
  document.getElementById('prog-txt').textContent=`${done} / ${tot} points vérifiés`;
  document.getElementById('prog-fill').style.width=`${Math.round(done/tot*100)}%`;
}

function resetAll(){Object.keys(state).forEach(k=>{state[k]=null;delete selOpt[k];});renderAll();}

function openSummary(){
  const all=DATA.flatMap(s=>s.items.map(i=>({...i,sTitle:s.title})));
  const chk=all.filter(i=>state[i.id]!==null);
  const cnt={ok:0,aprevoir:0,negociation:0,refus:0};
  chk.forEach(i=>cnt[state[i.id]]++);
  const critRf=chk.filter(i=>i.weight==='crit'&&state[i.id]==='refus').length;
  const critNg=chk.filter(i=>i.weight==='crit'&&state[i.id]==='negociation').length;

  let vC,vT,vS;
  if(critRf>0){vC='v-refus';vT='REFUS';vS=`${critRf} point${critRf>1?'s':''} critique${critRf>1?'s':''} rédhibitoire${critRf>1?'s':''}`;
  }else if(cnt.refus>0){vC='v-refus';vT='REFUS';vS=`${cnt.refus} point${cnt.refus>1?'s':''} rédhibitoire${cnt.refus>1?'s':''}`;
  }else if(critNg>0){vC='v-nego';vT='NÉGOCIATION FORTE';vS=`${critNg} point${critNg>1?'s':''} critique${critNg>1?'s':''} à déduire du prix`;
  }else if(cnt.negociation>0){vC='v-nego';vT='À NÉGOCIER';vS=`${cnt.negociation} point${cnt.negociation>1?'s':''} à chiffrer`;
  }else if(cnt.aprevoir>0){vC='v-warn';vT='ACCEPTABLE';vS=`${cnt.aprevoir} point${cnt.aprevoir>1?'s':''} d'entretien à prévoir`;
  }else if(!chk.length){vC='v-warn';vT='EN COURS';vS='Aucun point coché';
  }else{vC='v-ok';vT='OK';vS='Tous les points vérifiés sont corrects';}

  const grp=(items,impact)=>items.map(i=>{
    const ot=selOpt[i.id]!==undefined?i.options[selOpt[i.id]].t:'';
    const wc={crit:'w-crit',cost:'w-cost',fin:'w-fin'}[i.weight];
    return `<div class="sum-item">
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
          <span class="sum-name">${i.title}</span>
          <span class="item-weight ${wc}" style="font-size:9px;padding:1px 5px">${WL[i.weight]}</span>
        </div>
        ${ot?`<div class="sum-obs">${ot}</div>`:''}
      </div>
      <div class="sum-tag imp-${impact}">${IL[impact]}</div>
    </div>`;
  }).join('');

  const rfI=chk.filter(i=>state[i.id]==='refus');
  const ngI=chk.filter(i=>state[i.id]==='negociation');
  const apI=chk.filter(i=>state[i.id]==='aprevoir');
  const okI=chk.filter(i=>state[i.id]==='ok');
  const unc=all.filter(i=>state[i.id]===null);

  const alert=critRf>0
    ?`<div class="alert-refus"><span>⚠</span><span><strong>Point(s) critique(s) rédhibitoire(s)</strong> — châssis, refroidissement ou VIN compromis. Inutile de continuer la négociation.</span></div>`
    :critNg>0
    ?`<div class="alert-crit"><span>⚠</span><span><strong>Points critiques dégradés</strong> — coûts de remise en état importants. Négocier une décote significative ou refuser.</span></div>`
    :'';

  document.getElementById('modal-body').innerHTML=`
    <h2>Avis global — KZJ90</h2>
    <div class="verdict ${vC}">
      <div class="verd-lbl">${chk.length} / ${all.length} points vérifiés</div>
      <div class="verd-main">${vT}</div>
      <div class="verd-sub">${vS}</div>
    </div>
    ${alert}
    <div class="stats">
      <div class="stat" style="background:var(--rf-bg);color:var(--rf)"><div class="stat-n">${cnt.refus}</div><div class="stat-l">Refus</div></div>
      <div class="stat" style="background:var(--ng-bg);color:var(--ng)"><div class="stat-n">${cnt.negociation}</div><div class="stat-l">Négo</div></div>
      <div class="stat" style="background:var(--ap-bg);color:var(--ap)"><div class="stat-n">${cnt.aprevoir}</div><div class="stat-l">À prévoir</div></div>
      <div class="stat" style="background:var(--ok-bg);color:var(--ok)"><div class="stat-n">${cnt.ok}</div><div class="stat-l">OK</div></div>
    </div>
    ${rfI.length?`<div class="sum-sec"><h3>Points rédhibitoires</h3>${grp(rfI,'refus')}</div>`:''}
    ${ngI.length?`<div class="sum-sec"><h3>À négocier</h3>${grp(ngI,'negociation')}</div>`:''}
    ${apI.length?`<div class="sum-sec"><h3>À prévoir</h3>${grp(apI,'aprevoir')}</div>`:''}
    ${okI.length?`<div class="sum-sec"><h3>Points corrects</h3>${grp(okI,'ok')}</div>`:''}
    ${unc.length?`<div class="sum-sec"><h3>Non vérifiés (${unc.length})</h3>${unc.map(i=>`<div class="sum-item unc"><span class="sum-name">${i.title}</span><span class="sum-tag" style="background:#F0F4F8;color:#888">—</span></div>`).join('')}</div>`:''}
  `;
  document.getElementById('modal').classList.add('v');
}

function closeM(){document.getElementById('modal').classList.remove('v');}
function bgClose(e){if(e.target===document.getElementById('modal'))closeM();}

renderAll();
</script>
</body>
</html>
